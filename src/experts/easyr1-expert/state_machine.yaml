# easyr1-port workflow state machine — canonical spec for easyr1-expert
#
# Read by src/scripts/workflow/workflow_critic.py (arrives in S5).
# Any change here MUST be mirrored in src/experts/easyr1-expert/SKILL.md
# (future pre-commit hook enforces drift check).
#
# This YAML encodes what MUST and MUST NOT happen at each workflow phase.
# Critic reads it and rejects phase transitions that violate invariants.
#
# Stage 0: 1 consumer expert, no DAG, no cross-expert orchestration. 3 hard
# global invariants. Phase set is linear P0..P7.

version: 1
schema_version: "0.1"
workflow_name: easyr1-port
stage: 0
last_updated: "2026-04-22"

# ---------------------------------------------------------------------------
# Global invariants — applied by critic at every phase unconditionally.
# ---------------------------------------------------------------------------
global_invariants:

  - id: G1
    description: "Orchestrator MUST NOT directly Edit files under upstream/EasyR1/verl/, upstream/EasyR1/examples/, or upstream/EasyR1/Dockerfile* — all port-code edits go through easyr1-port-worker agent."
    check: "PreToolUse on Edit: path matching upstream/EasyR1/(verl|examples)/ or Dockerfile* is rejected unless $CLAUDE_AGENT_NAME == 'easyr1-port-worker'"
    rationale: "Orchestrator editing port code bypasses worker Stop hook (static_check + PROGRESS signing + log evidence enforcement). Analogous to a5_ops G1 (commit 0c06b74, 2026-04-21). We saw NPU-OPS-010 version: prior session treated hand-editing run-npu-container.sh as if skill chain did it; invariant here prevents orchestrator from bypassing the worker in a similar way."
    severity: BLOCKING

  - id: G2
    description: "Port code MUST pass static checks (py_compile + dry-import of `verl`) before any phase advances past P5 (code generation phase)."
    check: "Stop hook on easyr1-port-worker: invoke scripts/static_check.py on all files edited this session (full verl/ tree) + dry-import verl. Reject if any file raises SyntaxError or import of `verl` fails."
    rationale: "2026-04-22 round 2 cold-drive agent produced `from ..utils.device import ...` inserted inside an unclosed `from ..utils.torch_functional import (` block in fsdp_workers.py. Docker build passed (pip install -e . doesn't validate Python) but runtime would crash at first verl import. Without this check, customer agents ship syntactically invalid code that passes the shallow build test."
    severity: BLOCKING

  - id: G3
    description: "Any 'PASS' / 'smoke PASS' / 'V1.x green' / 'end-to-end closed' language in agent artifacts MUST be backed by a concrete log file path that exists and contains the expected numeric markers (entropy_loss value in baseline band for the claimed rung)."
    check: "PostToolUse on agent report / Stop hook: grep agent's PROGRESS.md / RESULTS.md for claim keywords ('PASS', 'green', 'closed', 'complete'). If present, require same report to reference a log file path. That path must exist. Its content must contain an 'entropy_loss' line with a numeric value in the expected band per smoke-baseline for the claimed rung."
    rationale: "NPU-OPS-010: prior session inflated manual V1.4 success into 'P1 end-to-end closed'. Root anti-pattern was claiming PASS without numeric evidence tied to actual log files. This invariant makes it mechanically impossible to self-deceive or deceive customers."
    severity: BLOCKING

# ---------------------------------------------------------------------------
# Workflow phases — sequential (Stage 0 has no parallel branches).
# ---------------------------------------------------------------------------
phases:

  P0_parse_args:
    order: 1
    description: "Parse CLI, determine MODE + target image, load .easyr1_env"
    preconditions: []
    required_actions:
      - "Determine MODE: reproduce | new-commit <hash> | --diag"
      - "Determine TARGET_IMAGE: v1 | v2 | explicit image tag"
      - "Determine EASYR1_REF (default: hiyouga/EasyR1 master at dd71bbd or new-commit arg)"
      - "Create workspace/easyr1-port-{timestamp}/"
      - "Load .easyr1_env (ssh config, chip defaults)"
    required_artifacts:
      - path: "workspace/easyr1-port-{ts}/PROGRESS.md"
        must_exist: true
        content_must_contain:
          - "MODE:"
          - "EASYR1_REF:"
          - "TARGET_IMAGE:"
    invariants:
      - "MODE in [reproduce, new-commit, --diag]"
    prohibited_actions: []
    next: [P1_dep_audit]

  P1_dep_audit:
    order: 2
    description: "Run dep-gap-detect. Stage 0 asserts D=0."
    preconditions: [P0_parse_args]
    required_actions:
      - "Invoke scripts/dep-gap-detect.sh with requirements.txt + TARGET_IMAGE inventory"
      - "Record exit code in PROGRESS.md"
      - "If exit 1 (D≥1): halt — Stage 0 doesn't handle this scenario"
    required_artifacts:
      - path: "workspace/easyr1-port-{ts}/dep-gap-report.md"
        must_exist: true
    invariants:
      - "Stage 0: dep-gap exit code == 0 (D=0). If 1, halt with clear message."
    prohibited_actions:
      - "Silently advancing when D≥1"
    next: [P2_image_inventory]

  P2_image_inventory:
    order: 3
    description: "Inspect target image, confirm triton-ascend integrity, record baseline"
    preconditions: [P1_dep_audit]
    required_actions:
      - "Run scripts/inspect-ascend-image.sh TARGET_IMAGE"
      - "Check NPU-BUG-001 triton-ascend integrity"
    required_artifacts:
      - path: "knowledge/images/{image-slug}.md"
        must_exist: true
    invariants: []
    prohibited_actions: []
    next: [P3_upstream_fetch]

  P3_upstream_fetch:
    order: 4
    description: "Fetch upstream EasyR1 + reference repos for code-path-sweep"
    preconditions: [P2_image_inventory]
    required_actions:
      - "Invoke scripts/fetch-upstream.sh"
      - "Verify upstream/EasyR1 checkout matches EASYR1_REF"
    required_artifacts: []
    invariants:
      - "upstream/EasyR1 checked out at EASYR1_REF (commit hash or branch)"
    prohibited_actions:
      - "Reading git log / commit content of zhshgmail/EasyR1 ascend-port branches (cheating vector — see e2e-validation-spec.md)"
    next: [P4_code_path_sweep]

  P4_code_path_sweep:
    order: 5
    description: "Scan EasyR1 source for CUDA-only callsites. Hit table per NPU-CP-* ID."
    preconditions: [P3_upstream_fetch]
    required_actions:
      - "Invoke scripts/code-path-sweep.sh upstream/EasyR1"
      - "Review hits; mark disposition: fix-now | defer | N/A"
    required_artifacts:
      - path: "workspace/easyr1-port-{ts}/code-path-sweep.md"
        must_exist: true
    invariants: []
    prohibited_actions: []
    next: [P5_port_worker]

  P5_port_worker:
    order: 6
    description: "Spawn easyr1-port-worker — Phase A (KB) → B (code) → C (build+static_check) → D (deploy+smoke+fix). Worker internal fix loop."
    preconditions: [P4_code_path_sweep]
    required_actions:
      - "Spawn Agent(subagent_type=Explore, brief=agent.md + context)"
      - "Worker exits via Stop hook enforcing G2"
      - "Read worker's PROGRESS.md handoff"
    required_artifacts:
      - path: "workspace/easyr1-port-{ts}/analysis.md"
        must_exist: true
      - path: "workspace/easyr1-port-{ts}/port-branch-commits.log"
        must_exist: true
      - path: "workspace/easyr1-port-{ts}/static-check-report.json"
        must_exist: true
        content_must_contain:
          - "py_compile"
      - path: "workspace/easyr1-port-{ts}/PROGRESS.md"
        content_must_contain:
          - "Handoff:"
    invariants:
      - "All edited Python files pass py_compile (G2)"
      - "dry-import verl succeeds (G2)"
      - "Docker image tag is unique per-session (NOT reusing easyr1-npu:ascend-port or easyr1-npu:round2 etc.)"
    prohibited_actions:
      - "Claiming PASS without log evidence (G3)"
      - "Orchestrator Edit to upstream/EasyR1/verl/ (G1)"
    next: [P6_smoke_ladder]

  P6_smoke_ladder:
    order: 7
    description: "Walk smoke ladder V1.1 → V1.3 → V1.4 → V1.5 → V2.1 → V2.2. Each rung PASS/FAIL verified via log grep."
    preconditions: [P5_port_worker]
    required_actions:
      - "For each rung in [V1.1, V1.3, V1.4, V1.5, V2.1, V2.2]: invoke scripts/smoke_validate.sh with expected numerics from references/SMOKE_BASELINE.md"
      - "Record per-rung result in smoke-ladder-results.md"
    required_artifacts:
      - path: "workspace/easyr1-port-{ts}/smoke-ladder-results.md"
        must_exist: true
        content_must_contain:
          - "V1.1:"
          - "V1.3:"
          - "V1.4:"
    invariants:
      - "Every claimed-PASS rung has matching /tmp/.../easyr1-logs/*.log file path in report (G3)"
      - "V1.4 step1 entropy_loss is within baseline band for TARGET_IMAGE (see SMOKE_BASELINE.md)"
      - "Stage 0 required rungs: V1.1 + V1.3 + V1.4. V1.5/V2.1/V2.2 are bonus (OK to mark DEFERRED)"
    prohibited_actions:
      - "Claiming 'ladder green' with missing rungs (V1.1/V1.3/V1.4 required)"
      - "Reusing cached results from prior sessions"
    next: [P7_report]

  P7_report:
    order: 8
    description: "Final report: provenance table, gap catalog, closure classification"
    preconditions: [P6_smoke_ladder]
    required_actions:
      - "Write RESULTS.md"
      - "Per-artifact provenance: produced_by: easyr1-port-worker | orchestrator | human-intervention"
      - "Classify: CLOSED (Stage 0 PASS = V1.1+V1.3+V1.4 green, zero human-intervention) | PARTIAL | FAILED"
      - "If CLOSED, append porting-journal.md entry"
    required_artifacts:
      - path: "workspace/easyr1-port-{ts}/RESULTS.md"
        must_exist: true
        content_must_contain:
          - "Provenance table"
          - "Closure classification:"
    invariants:
      - "CLOSED classification requires every artifact's produced_by ∈ {easyr1-port-worker, orchestrator}, NOT human-intervention"
    prohibited_actions:
      - "Self-assigning CLOSED with human-intervention entries in provenance (NPU-OPS-010)"
    next: []  # terminal
